<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      document.addEventListener("DOMContentLoaded", function () {
  let isDarkTheme = localStorage.getItem("isDark");

  const darkImg = document.querySelector("#darkimg");
  const whiteImg = document.querySelector("#whiteimg");

  if (isDarkTheme === "true") {
    document.body.classList.add("dark");
    darkImg?.classList.remove("hidden");
    whiteImg?.classList.add("hidden");
  } else {
    document.body.classList.remove("dark");
    darkImg?.classList.add("hidden");
    whiteImg?.classList.remove("hidden");
  }
});
    </script>
   
    <link rel="stylesheet" href="styles/style.css" />
    <script src="./script.js" defer></script>
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>Where in the world?</h1>
      <img class="dark-light-mode" id="whiteimg" src="./design/dark.svg" alt="" />
      <img class="dark-light-mode hidden" id="darkimg" src="./design/white.svg" alt="">
    </header>
    <main>
      <section class="filtering">
        <form class="searchbar">
          <input class="searchtext" type="text" placeholder="Search for a country…" />
        </form>
      </section>
      <section class="countries"></section>
    </main>
  </body>
</html>
